name: Gemini Code Review

# develop이나 main 브랜치로 PR이 올라오거나 코드가 업데이트될 때 실행
on:
  pull_request:
    branches: [ develop, main ]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write # PR에 AI가 직접 댓글을 달아야 하므로 write 권한이 필요합니다.

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      # 1. 깃허브 마켓플레이스에서 내 소스코드를 체크아웃하는 액션
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2. 선택하신 Gemini 리뷰 봇 실행
      - name: Gemini code review
        uses: jgunnink/gemini-review-bot@v1.2.0
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }} # ⚠️ 닫는 중괄호 '}' 추가 완료!
          # (선택) 만약 특정 모델을 강제하고 싶다면 아래 주석을 풀고 설정하세요.
          # model: "gemini-1.5-pro-latest"